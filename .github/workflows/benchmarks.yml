name: Run Benchmarks

on:
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build benchmarks
        run: dotnet build GSCLSP.Benchmark/GSCLSP.Benchmark.csproj --configuration Release -p:RuntimeIdentifier=linux-x64

      - name: Run benchmarks
        run: dotnet run --project GSCLSP.Benchmark/GSCLSP.Benchmark.csproj --configuration Release -p:RuntimeIdentifier=linux-x64
