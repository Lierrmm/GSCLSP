name: Build And Release VSIX

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Publish language server
        run: >
          dotnet publish GSCLSP.Server/GSCLSP.Server.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true

      - name: Prepare extension out folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "GSCLSP.Extension/out/data" -Force | Out-Null
          Copy-Item "GSCLSP.Server/bin/Release/net10.0/win-x64/publish/GSCLSP.Server.exe" "GSCLSP.Extension/out/GSCLSP.Server.exe" -Force
          Copy-Item "GSCLSP.Core/data/iw4_builtins.json" "GSCLSP.Extension/out/data/iw4_builtins.json" -Force

      - name: Install extension dependencies
        working-directory: GSCLSP.Extension
        run: bun install --frozen-lockfile

      - name: Set extension version from tag
        shell: pwsh
        working-directory: GSCLSP.Extension
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag.StartsWith("v")) {
            $tag = $tag.Substring(1)
          }
          npm version $tag --no-git-tag-version

      - name: Build extension
        working-directory: GSCLSP.Extension
        run: bun run build

      - name: Package extension
        working-directory: GSCLSP.Extension
        run: bun run package

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ endsWith(github.ref_name, '-pre') }}
          files: GSCLSP.Extension/*.vsix
